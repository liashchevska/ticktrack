server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA routing
    location / {
        try_files $uri /index.html;
    }
    # Django API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # Allauth 
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}